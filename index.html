            { q: "144. Pernyataan di bawah ini yang tidak termasuk cakupan kurikulum adalah...", opts: { A: "humanistik", B: "praktis", C: "akademis", D: "keterampilan" }, ans: "D" },
            { q: "145. Musik seni ialah musik yang diciptakan untuk...", opts: { A: "memuaskan pendengar", B: "untuk memuja Tuhan", C: "upacara perkawinan", D: "keindahan musik itu sendiri" }, ans: "D" },
            { q: "146. Pembelajaran terpadu yang bertema adalah pembelajaran terpadu yang bersifat...", opts: { A: "tematis", B: "vertikal", C: "horizontal", D: "majemuk" }, ans: "A" },
            { q: "147. Kegiatan memecahkan masalah pada waktu berolah seni menunjukkan bahwa seni memiliki fungsi sebagai media dalam...", opts: { A: "bermain", B: "komunikasi", C: "pendidikan", D: "ekspresi" }, ans: "C" },
            { q: "148. Fungsi tari Serampang Dua Belas dari Sumatra Barat yang bersifat ringan dan gembira sebagai tari...", opts: { A: "upacara", B: "hiburan", C: "tontonan", D: "pertunjukan" }, ans: "B" },
            { q: "149. Pembelajaran terpadu kelas adalah upaya untuk mengatasi keterbatasan .... (1. ruang 2. guru 3. waktu)", opts: { A: "1 dan 2 benar", B: "1 dan 3 benar", C: "2 dan 3 benar", D: "1, 2, dan 3 benar" }, ans: "B" },
            { q: "150. Guru dalam membuat pengembangan materi pelajaran agar mudah mengemas bahan pelajarannya dalam pembelajaran terpadu, perlu memperhatikan aspek-aspek berikut, kecuali...", opts: { A: "kebutuhan dasar", B: "kemampuan siswa", C: "karakteristik siswa", D: "usia siswa" }, ans: "D" }
        ];

        let currentIndex = 0;
        let score = 0;
        let userAnswers = [];

        const domQuestion = document.getElementById('question');
        const domOptions = document.getElementById('options');
        const domFeedback = document.getElementById('feedback');
        const domTracker = document.getElementById('tracker');
        const domScore = document.getElementById('score');
        
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const btnCheck = document.getElementById('btn-check');

        // Fungsi untuk mengacak urutan elemen dalam array
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Fungsi untuk memulai atau mengulang kuis dari awal
        function initQuiz() {
            currentIndex = 0;
            score = 0;
            userAnswers = new Array(quizData.length).fill(null);
            shuffleArray(quizData); // Mengacak soal setiap kali kuis diulang
            loadQuestion();
            updateNavButtons();
        }

        function loadQuestion() {
            const data = quizData[currentIndex];
            
            // Menghapus nomor asli dari string (misal: "1. ", "45. ") agar penomoran
            // di layar menyesuaikan urutan yang sudah diacak (1, 2, 3... dst).
            const cleanQuestionText = data.q.replace(/^\d+\.\s*/, '');
            
            domQuestion.innerHTML = `${currentIndex + 1}. ${cleanQuestionText}`;
            domTracker.textContent = `Soal ${currentIndex + 1} dari ${quizData.length}`;
            domScore.textContent = `Skor: ${score}`;
            
            domOptions.innerHTML = '';
            domFeedback.className = 'feedback-box';
            domFeedback.innerHTML = '';

            const answered = userAnswers[currentIndex];

            for (const [key, val] of Object.entries(data.opts)) {
                const label = document.createElement('label');
                label.className = 'option-item';
                
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'answer_opt';
                radio.value = key;
                
                if (answered) {
                    radio.disabled = true;
                    if (key === data.ans) {
                        label.classList.add('correct');
                    } else if (key === answered && answered !== data.ans) {
                        label.classList.add('wrong');
                    }
                    radio.checked = (key === answered);
                }

                const span = document.createElement('span');
                span.innerHTML = `<span class="option-letter">${key}.</span> ${val}`;
                
                label.appendChild(radio);
                label.appendChild(span);
                domOptions.appendChild(label);
            }

            if (answered) {
                showResult(answered === data.ans);
                btnCheck.disabled = true;
            } else {
                btnCheck.disabled = false;
            }
        }

        function verifyAnswer() {
            const checked = document.querySelector('input[name="answer_opt"]:checked');
            if (!checked) {
                alert('Pilih salah satu jawaban terlebih dahulu!');
                return;
            }

            const data = quizData[currentIndex];
            const answer = checked.value;
            const isCorrect = (answer === data.ans);

            userAnswers[currentIndex] = answer;

            if (isCorrect) score += 10; 
            
            loadQuestion(); 
            updateNavButtons();
        }

        function showResult(isCorrect) {
            domFeedback.classList.add('show');
            if (isCorrect) {
                domFeedback.innerHTML = '✨ Jawaban Anda Benar!';
                domFeedback.className = 'feedback-box show success';
            } else {
                const data = quizData[currentIndex];
                domFeedback.innerHTML = `❌ Jawaban Salah. Kunci jawaban yang tepat adalah: <strong>${data.ans}</strong>`;
                domFeedback.className = 'feedback-box show error';
            }
        }

        function updateNavButtons() {
            btnPrev.disabled = currentIndex === 0;
            if (currentIndex === quizData.length - 1) {
                btnNext.textContent = 'Selesai Kuis';
            } else {
                btnNext.textContent = 'Selanjutnya';
            }
        }

        btnCheck.addEventListener('click', verifyAnswer);

        btnNext.addEventListener('click', () => {
            if (currentIndex < quizData.length - 1) {
                currentIndex++;
                loadQuestion();
                updateNavButtons();
            } else {
                // Notifikasi penyelesaian
                alert(`Kuis Selesai! Skor Akhir Anda adalah: ${score} dari Total ${quizData.length * 10}`);
                
                // Dialog konfirmasi untuk mengulang dengan urutan acak yang baru
                if(confirm("Apakah Anda ingin mengerjakan ulang kuis dengan urutan soal yang baru?")) {
                    initQuiz();
                }
            }
        });

        btnPrev.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                loadQuestion();
                updateNavButtons();
            }
        });

        // Inisialisasi Kuis saat memuat pertama kali
        initQuiz();
    </script>
</body>
</html>
